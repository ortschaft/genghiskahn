<!DOCTYPE html>
<html>
<head>
    <title>Genghis Kahn</title>
    <style>
        body { 
            /* HINTERGRUNDBILD */
            background-image: url('https://historiablog.org/wp-content/uploads/2024/07/genghis-khan.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            
            /* SCHRIFTART & FARBE */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            color: white; 
            
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.7); /* Macht Text auf Bildern lesbar */
        }

        h1 { font-size: 3rem; margin-bottom: 10px; }
        p { font-size: 1.2rem; }

        /* EIN COOLER BUTTON FÜR DEINE ÜBERRASCHUNG */
        .btn {
            margin-top: 20px;
            padding: 15px 30px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover { background-color: #0056b3; transform: scale(1.1); }
    </style>
</head>
<body>

    <h1>Willkommen auf Genghis Kahn.com</h1>
    <p>Klicke auf den unteren Button für eine Überraschung</p>
    
    <a href="https://ligshtshot.site/" class="btn">Klick mich!</a>
</body>
</html>
